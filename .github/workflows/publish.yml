name: WealthMarg Auto Publisher

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours UTC (5:30, 7:30, 9:30... IST)
  workflow_dispatch:        # Manual "Run now" button on GitHub

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google OAuth token
        run: echo '${{ secrets.GOOGLE_TOKEN_JSON }}' > token.json

      - name: Run publisher (1 article)
        env:
          WP_URL:              ${{ secrets.WP_URL }}
          WP_USERNAME:         ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:     ${{ secrets.WP_APP_PASSWORD }}
          MISTRAL_API_KEY:     ${{ secrets.MISTRAL_API_KEY }}
          GEMINI_API_KEYS:     ${{ secrets.GEMINI_API_KEYS }}
          GOOGLE_CLIENT_ID:    ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          SPREADSHEET_ID:       ${{ secrets.SPREADSHEET_ID }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python auto_publisher.py --test
